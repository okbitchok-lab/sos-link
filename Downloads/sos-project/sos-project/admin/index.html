<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel SOS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161920;
      --border: #252830;
      --accent: #ef4444;
      --accent-soft: rgba(239,68,68,0.12);
      --text: #e8eaf0;
      --muted: #6b7280;
      --green: #22c55e;
      --green-soft: rgba(34,197,94,0.12);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    /* ── Login ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 1rem;
    }

    #login-screen h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    #login-screen p { font-size: 14px; color: var(--muted); }

    #login-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 300px;
    }

    #login-form input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-size: 14px;
      outline: none;
    }

    #login-form input:focus { border-color: var(--accent); }

    #login-form button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    #login-error {
      color: var(--accent);
      font-size: 13px;
      display: none;
    }

    /* ── Dashboard ── */
    #dashboard { display: none; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 600;
    }

    header .logo .dot {
      width: 10px; height: 10px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    header button {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      font-size: 13px;
      cursor: pointer;
    }

    .main { max-width: 800px; margin: 0 auto; padding: 1.5rem 1rem; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }

    .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .stat .value { font-size: 26px; font-weight: 700; }
    .stat .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

    .section-title {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
    }

    .alert-list { display: flex; flex-direction: column; gap: 12px; }

    .alert-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 1rem;
      animation: slideIn 0.3s ease;
    }

    .alert-card.novo { border-color: var(--accent); background: var(--accent-soft); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .alert-photo {
      width: 80px; height: 80px;
      border-radius: 8px;
      object-fit: cover;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: var(--muted);
      overflow: hidden;
    }

    .alert-photo img { width: 100%; height: 100%; object-fit: cover; }

    .alert-info .time {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .alert-info .coords {
      font-size: 14px;
      margin-bottom: 8px;
      font-family: monospace;
    }

    .alert-info a {
      display: inline-block;
      font-size: 12px;
      color: #60a5fa;
      text-decoration: none;
      background: rgba(96,165,250,0.1);
      border-radius: 6px;
      padding: 4px 10px;
    }

    .alert-info a:hover { background: rgba(96,165,250,0.2); }

    .no-alerts {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 14px;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .badge-red { background: var(--accent-soft); color: var(--accent); }
    .badge-green { background: var(--green-soft); color: var(--green); }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 1rem;
    }

    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="login-screen">
    <h1>🛡 Painel SOS</h1>
    <p>Acesso restrito</p>
    <div id="login-form">
      <input type="password" id="senha-input" placeholder="Senha de acesso" />
      <button onclick="fazerLogin()">Entrar</button>
      <span id="login-error">Senha incorreta.</span>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard">
    <header>
      <div class="logo">
        <div class="dot"></div>
        Painel SOS
      </div>
      <button onclick="sair()">Sair</button>
    </header>

    <div class="main">
      <div class="stats-grid">
        <div class="stat">
          <div class="label">Total de alertas</div>
          <div class="value" id="stat-total">—</div>
          <div class="sub">desde o início</div>
        </div>
        <div class="stat">
          <div class="label">Último alerta</div>
          <div class="value" style="font-size:16px; padding-top:4px;" id="stat-ultimo">—</div>
          <div class="sub" id="stat-status"></div>
        </div>
        <div class="stat">
          <div class="label">Com localização</div>
          <div class="value" id="stat-loc">—</div>
          <div class="sub">alertas com GPS</div>
        </div>
      </div>

      <div class="section-title">Histórico de alertas</div>
      <button class="refresh-btn" onclick="carregarAlertas()">↻ Atualizar</button>

      <div class="alert-list" id="alert-list">
        <div class="no-alerts">Carregando...</div>
      </div>
    </div>
  </div>

  <script>
    // ─────────────────────────────────────────
    //  CONFIGURAÇÕES
    // ─────────────────────────────────────────
    const SUPABASE_URL = 'https://jxgxpwoavxftyeohgmjm.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_xpNd_6XvlhEr-so3_8hKEA_sN2tVcVw';

    // Senha local do painel (mude para algo seguro)
    const SENHA_PAINEL = 'minhasenha123';

    // ─────────────────────────────────────────
    //  LOGIN
    // ─────────────────────────────────────────
    function fazerLogin() {
      const input = document.getElementById('senha-input').value;
      if (input === SENHA_PAINEL) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        carregarAlertas();
        setInterval(carregarAlertas, 30000); // atualiza a cada 30s
      } else {
        document.getElementById('login-error').style.display = 'block';
      }
    }

    document.getElementById('senha-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') fazerLogin();
    });

    function sair() {
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('senha-input').value = '';
    }

    // ─────────────────────────────────────────
    //  CARREGAR ALERTAS DO SUPABASE
    // ─────────────────────────────────────────
    async function carregarAlertas() {
      try {
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/alertas?select=*&order=timestamp.desc&limit=50`,
          {
            headers: {
              'apikey': SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            },
          }
        );
        const data = await res.json();
        renderAlertas(data);
      } catch (e) {
        document.getElementById('alert-list').innerHTML =
          '<div class="no-alerts">Erro ao conectar ao Supabase. Verifique as configurações.</div>';
      }
    }

    function renderAlertas(alertas) {
      const listEl = document.getElementById('alert-list');

      // Stats
      document.getElementById('stat-total').textContent = alertas.length;
      const comLoc = alertas.filter((a) => a.lat).length;
      document.getElementById('stat-loc').textContent = comLoc;

      if (alertas.length > 0) {
        const ultimo = new Date(alertas[0].timestamp);
        document.getElementById('stat-ultimo').textContent = ultimo.toLocaleString('pt-BR');
        const diff = Math.round((Date.now() - ultimo) / 60000);
        document.getElementById('stat-status').innerHTML =
          diff < 5
            ? '<span class="badge badge-red">RECENTE</span>'
            : `há ${diff} min`;
      }

      if (alertas.length === 0) {
        listEl.innerHTML = '<div class="no-alerts">Nenhum alerta ainda.<br>Assim que o link for acessado, aparece aqui.</div>';
        return;
      }

      listEl.innerHTML = alertas.map((a, i) => {
        const dt = new Date(a.timestamp).toLocaleString('pt-BR');
        const temFoto = a.foto_base64 && a.foto_base64.startsWith('data:');
        const temLoc = a.lat && a.lng;
        const mapsUrl = temLoc
          ? `https://maps.google.com/?q=${a.lat},${a.lng}`
          : null;

        return `
          <div class="alert-card ${i === 0 ? 'novo' : ''}">
            <div class="alert-photo">
              ${temFoto
                ? `<img src="${a.foto_base64}" alt="Foto capturada" />`
                : '📷'}
            </div>
            <div class="alert-info">
              <div class="time">
                ${i === 0 ? '<span class="badge badge-red">NOVO</span> ' : ''}
                ${dt}
              </div>
              ${temLoc
                ? `<div class="coords">📍 ${Number(a.lat).toFixed(5)}, ${Number(a.lng).toFixed(5)}</div>
                   <a href="${mapsUrl}" target="_blank">🗺 Ver no Google Maps</a>`
                : '<div class="coords" style="color:var(--muted)">📍 Localização não obtida</div>'}
              ${!temFoto ? '<div style="font-size:12px; color:var(--muted); margin-top:6px;">📷 Foto não capturada</div>' : ''}
            </div>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
